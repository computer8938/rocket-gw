server {
  listen 80;
  server_name _;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  location /api/auth/ {
    proxy_pass http://rocket-auth:8090/;
  }

  location /api/admin/scraper/ {
    proxy_pass http://scraper-api:8081/;
  }

  location /api/admin/processor/ {
    proxy_pass http://processor:8082/;
  }

  location /api/customer/ {
    proxy_pass http://customer-api:8091/;
  }

  location = /admin {
    return 301 /admin/;
  }

  location ^~ /admin/ {
    proxy_pass http://rocket-alpha-admin-frontend:80/;
  }

  location / {
    proxy_pass http://rocket-alpha-customer-frontend:80/;
  }
}
